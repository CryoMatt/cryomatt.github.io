<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost and carbon comparator: Classic freezer Vs MVE Fusion</title>

<style>
:root {
  --land: #111111;
  --hover: #2563eb;
  --active: #1d4ed8;
  --sea: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --card: #f8fafc;
  --border: #e5e7eb;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: white;
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
}

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 22px 14px 36px;
}

h1 {
  margin: 0 0 6px;
  text-align: center;
  font-size: 28px;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin: 0 0 18px;
}

.map-card {
  border: 1px solid var(--border);
  border-radius: 18px;
  background: white;
  padding: 10px;
  overflow: hidden;
}

.map-scroll {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

svg {
  width: 100%;
  min-width: 760px;
  height: auto;
  display: block;
  background: var(--sea);
}

.country {
  fill: var(--land);
  stroke: #ffffff;
  stroke-width: 0.55;
  cursor: pointer;
  transition: fill 0.15s ease;
}

.continentGroup:hover .country {
  fill: var(--hover);
}

.continentGroup.active .country {
  fill: var(--active);
}

.info {
  margin-top: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--card);
  padding: 16px;
}

.panel h2 {
  margin: 0 0 8px;
  font-size: 20px;
}

.big {
  font-size: 26px;
  font-weight: bold;
  margin: 8px 0 12px;
}

.line {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid #e5e7eb;
}

.line:last-child { border-bottom: none; }

.buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

button {
  border: 1px solid var(--border);
  background: white;
  padding: 9px 12px;
  border-radius: 999px;
  cursor: pointer;
}

button:hover { background: #f1f5f9; }

.note {
  margin-top: 12px;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 800px) {
  .info { grid-template-columns: 1fr; }
  h1 { font-size: 24px; }
  .subtitle { font-size: 14px; }
  .map-card { padding: 6px; }
  svg { min-width: 720px; }
}

.ME{
  cursor:pointer;
}
.ME:hover{
  fill: var(--hover) !important;
}


.info, .panel, .buttons, .note{
  display:none !important;
}


/* Middle East as its own clickable region */
.country.ME,
.ME.country {
  cursor: pointer;
}

body.me-hover .country.ME,
body.me-hover .ME.country {
  fill: var(--hover) !important;
}

.continentGroup:hover .country.ME,
.continentGroup:hover .ME.country {
  fill: var(--land) !important;
}

.country.ME:hover,
.ME.country:hover {
  fill: var(--hover) !important;
}



/* Middle East is now a real SVG continent group */
#ME .country{
  fill: var(--land);
  stroke: #ffffff;
  stroke-width: 0.55;
  cursor: pointer;
}
#ME:hover .country{
  fill: var(--hover);
}


/* V2 Middle East native SVG link */
svg a { cursor: pointer; }
#ME { cursor: pointer; pointer-events: all; }
#ME .country { pointer-events: all; }
#ME:hover .country { fill: var(--hover) !important; }


.db-reference{
  font-size:11px;
  font-style:italic;
  color:#555555;
  margin-top:6px;
  margin-bottom:10px;
  line-height:1.3;
}


/* Database & Client Values label styling */
.db-client-bold-label{
  color:#000000 !important;
  font-weight:700 !important;
}

</style>
</head>

    ln2: "≈ 0.30 kgCO₂e/L",

  },

    text: "Mix souvent influencé par l’hydraulique selon les pays.",

  },
  AF: {

  },

  },

    ln2: "À définir",
    kwh: "Variable"
  }
};

const groups = document.querySelectorAll(".continentGroup");

groups.forEach(group => {
  group.addEventListener("click", () => {
    selectContinent(group.dataset.continent);
  });
});

function selectContinent(code) {
  const d = data[code];
  if (!d) return;

  groups.forEach(g => g.classList.remove("active"));
  const active = document.getElementById(code);
  if (active) active.classList.add("active");

  document.getElementById("continentName").innerText = d.name;
  document.getElementById("continentText").innerText = d.text;
  document.getElementById("ln2Value").innerText = d.ln2;
  document.getElementById("kwhValue").innerText = d.kwh;
  document.getElementById("codeValue").innerText = code;

  window.selectedCarbonContinent = code;
}
</script>










<script>
document.addEventListener('DOMContentLoaded', function(){
  const links = {
    EU: './europe.html',
    NA: './north-america.html',
    SA: './south-america.html',
    AF: './africa.html',
    AS: './asia.html',
    OC: './oceania.html'
  };

  Object.keys(links).forEach(function(id){
    const group = document.getElementById(id);
    if(group){
      group.style.cursor = 'pointer';
      group.addEventListener('click', function(){
        window.location.href = links[id];
      });
    }
  });
});
</script>
